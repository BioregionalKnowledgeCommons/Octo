# BKC KOI Node Stack
# PostgreSQL (pgvector + Apache AGE) + KOI Processor API
#
# Usage:
#   docker compose up -d              # start everything
#   docker compose logs -f koi-api    # watch API logs
#   docker compose down               # stop
#   docker compose down -v            # stop + delete data

services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres-age
    container_name: regen-koi-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-extensions.sql:/docker-entrypoint-initdb.d/00-init-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  koi-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.koi-api
    container_name: koi-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ${KOI_ENV_FILE:-.env}
    environment:
      # Override POSTGRES_URL to use Docker network hostname
      POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${KOI_DB_NAME:-octo_koi}
    ports:
      - "${KOI_API_BIND:-0.0.0.0}:${KOI_API_PORT:-8351}:8351"
    volumes:
      - ${KOI_VAULT_PATH:-./vault}:/data/vault
      - ${KOI_STATE_DIR:-./koi-state}:/data/koi-state
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8351/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: regen-koi-network
